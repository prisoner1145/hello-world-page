<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World Animation</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --duration: 0.08s;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: flex-start;
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      font-family: "Brush Script MT", "Segoe Script", "Lucida Handwriting", cursive;
    }

    .wrap {
      width: min(920px, 92vw);
      margin: clamp(2.2rem, 7vh, 4.5rem) auto 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 12vw, 7rem);
      font-style: italic;
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.2);
    }

    p {
      margin-top: 1.1rem;
      max-width: 62ch;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.8;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.92);
      font-family: "Georgia", "Times New Roman", serif;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateX(-0.4em) skewX(-14deg);
      animation: reveal var(--duration) ease-out forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateX(0) skewX(-14deg);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 id="text" aria-label="hello world"></h1>
    <p>
      夜色沉静，屏幕上的字像一道光缓缓展开。你正在看的这一页只是一个开始，
      接下来可以继续加入图片、按钮、分区内容，慢慢把它变成真正完整的网站首页。
    </p>
  </main>

  <script>
    const text = "hello world";
    const el = document.getElementById("text");

    text.split("").forEach((ch, i) => {
      const span = document.createElement("span");
      span.className = "char";
      span.textContent = ch === " " ? "\u00A0" : ch;
      span.style.animationDelay = `${i * 0.06}s`;
      el.appendChild(span);
    });
  </script>
</body>
</html>
