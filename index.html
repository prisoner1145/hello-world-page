<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人资料库</title>
  <style>
    :root {
      --bg: #060606;
      --panel: #0d0d0d;
      --line: rgba(255, 255, 255, 0.12);
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(91, 112, 255, 0.15), transparent 35%),
        radial-gradient(circle at 95% 20%, rgba(0, 184, 217, 0.12), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .container {
      width: min(1180px, 92vw);
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
      background: rgba(6, 6, 6, 0.82);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #8db2ff);
      box-shadow: 0 0 20px rgba(141, 178, 255, 0.45);
    }

    .nav {
      display: flex;
      gap: 1.4rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .nav a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 0.7rem;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border-color: #fff;
      font-weight: 600;
    }

    .hero {
      padding: clamp(4rem, 11vh, 8rem) 0 3rem;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8.8vw, 5.8rem);
      line-height: 1.05;
      font-family: "Brush Script MT", "Segoe Script", "Lucida Handwriting", cursive;
      font-style: italic;
      font-weight: 500;
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.24);
    }

    .subtitle {
      margin: 1rem auto 0;
      max-width: 700px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      line-height: 1.75;
    }

    .hero-actions {
      margin-top: 1.8rem;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      padding: 2.2rem 0 3.5rem;
    }

    .card {
      background: linear-gradient(150deg, #101010, #0a0a0a);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1rem;
      min-height: 130px;
    }

    .card h3 {
      margin: 0 0 0.55rem;
      font-size: 1.05rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateX(-0.35em) skewX(-12deg);
      animation: reveal 0.09s ease-out forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateX(0) skewX(-12deg);
      }
    }

    @media (max-width: 980px) {
      .nav {
        display: none;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>我的资料库</span>
      </div>
      <nav class="nav" aria-label="主导航">
        <a href="#">首页</a>
        <a href="#">知识文档</a>
        <a href="#">项目资料</a>
        <a href="#">学习笔记</a>
        <a href="#">归档</a>
      </nav>
      <div class="actions">
        <a class="btn" href="#">搜索</a>
        <a class="btn btn-primary" href="#">新建资料</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="text" aria-label="hello world"></h1>
      <p class="subtitle">
        统一存放文档、链接、图片与笔记，快速查找、轻松归类，让常用资料在同一个入口高效管理。
      </p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="#">进入资料中心</a>
        <a class="btn" href="#">查看最近更新</a>
      </div>
    </section>

    <section class="cards" aria-label="资料分类">
      <article class="card">
        <h3>工作资料</h3>
        <p>会议纪要、方案文档、接口说明与周报汇总。</p>
      </article>
      <article class="card">
        <h3>学习资料</h3>
        <p>课程笔记、书籍摘录、练习代码和知识卡片。</p>
      </article>
      <article class="card">
        <h3>灵感收藏</h3>
        <p>设计参考、网页截图、创意方向与可复用模板。</p>
      </article>
    </section>
  </main>

  <script>
    const text = "hello world";
    const el = document.getElementById("text");

    text.split("").forEach((ch, i) => {
      const span = document.createElement("span");
      span.className = "char";
      span.textContent = ch === " " ? "\u00A0" : ch;
      span.style.animationDelay = `${i * 0.055}s`;
      el.appendChild(span);
    });
  </script>
</body>
</html>
